version: '3.8'

services:
  teamflow-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
      - "3001:3001"
      - "3002:3002"
      - "3003:3003"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/host-app/node_modules
      - /app/apps/dashboard-app/node_modules
      - /app/apps/project-app/node_modules
      - /app/apps/task-app/node_modules
      - /app/packages/shared-ui/node_modules
      - /app/packages/shared-utils/node_modules
    environment:
      - NODE_ENV=development
